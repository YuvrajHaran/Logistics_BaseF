<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
    <title>Notifications - LogisticsPro</title>
    <link rel="stylesheet" href="assets/css/style.css">
</head>

<body>
    <script src="assets/js/layout.js"></script>

    <main class="main-content">
        <div class="page-header">
            <h1>🔔 Notifications</h1>
            <button class="btn btn-outline" id="markAllReadBtn">✅ Mark All Read</button>
        </div>

        <div class="notification-tabs">
            <button class="notif-tab active" data-filter="all">All <span class="tab-count"
                    id="count-all">0</span></button>
            <button class="notif-tab" data-filter="unread">Unread <span class="tab-count danger"
                    id="count-unread">0</span></button>
            <button class="notif-tab" data-filter="urgent">🔴 Urgent <span class="tab-count danger"
                    id="count-urgent">0</span></button>
            <button class="notif-tab" data-filter="warning">⚠️ Warning <span class="tab-count warning"
                    id="count-warning">0</span></button>
            <button class="notif-tab" data-filter="info">ℹ️ Info <span class="tab-count"
                    id="count-info">0</span></button>
        </div>

        <div class="notifications-container" id="notificationsList">
            <div id="notif-skeleton" style="display:flex;flex-direction:column;gap:.75rem;">
                <div
                    style="height:90px;border-radius:.75rem;background:linear-gradient(90deg,#f3f4f6 25%,#f9fafb 50%,#f3f4f6 75%);background-size:200% 100%;animation:shimmer 1.4s infinite;">
                </div>
                <div
                    style="height:90px;border-radius:.75rem;background:linear-gradient(90deg,#f3f4f6 25%,#f9fafb 50%,#f3f4f6 75%);background-size:200% 100%;animation:shimmer 1.4s infinite;">
                </div>
                <div
                    style="height:90px;border-radius:.75rem;background:linear-gradient(90deg,#f3f4f6 25%,#f9fafb 50%,#f3f4f6 75%);background-size:200% 100%;animation:shimmer 1.4s infinite;">
                </div>
            </div>
        </div>
    </main>

    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <script src="assets/js/api.js"></script>
    <script src="assets/js/auth.js"></script>
    <script src="assets/js/main.js"></script>

    <script>
        $(function () {

            /* ── Helpers ─────────────────────────────────────────────────────────── */

            function getUrgency(daysLeft) {
                if (daysLeft <= 0) return 'urgent';
                if (daysLeft <= 7) return 'warning';
                return 'info';
            }

            function urgencyIcon(u) {
                return u === 'urgent' ? '🔴' : u === 'warning' ? '⚠️' : 'ℹ️';
            }

            function daysLabel(daysLeft, expiryDate) {
                if (daysLeft <= 0 && expiryDate) {
                    const d = new Date(expiryDate);
                    const day = d.getDate();
                    const suffix = day % 10 === 1 && day !== 11 ? 'st'
                        : day % 10 === 2 && day !== 12 ? 'nd'
                            : day % 10 === 3 && day !== 13 ? 'rd' : 'th';
                    const month = d.toLocaleString('en-IN', { month: 'long' });
                    const year = d.getFullYear();
                    return 'Expired on ' + day + suffix + ' ' + month + ' ' + year;
                }
                if (daysLeft === 1) return 'Expires tomorrow';
                return 'Expires in ' + daysLeft + ' days';
            }

            function typeLabel(type) {
                if (!type) return 'Document';
                return type.replace(/_/g, ' ').replace(/\b\w/g, function (c) { return c.toUpperCase(); });
            }

            function buildTitle(alert) {
                return typeLabel(alert.type) + ' — ' + (alert.vehicleNo || '');
            }

            function escHtml(s) {
                if (!s) return '';
                return String(s)
                    .replace(/&/g, '&amp;')
                    .replace(/</g, '&lt;')
                    .replace(/>/g, '&gt;');
            }

            /* ── Card builder ────────────────────────────────────────────────────── */

            function buildCard(alert) {
                const urgency = getUrgency(alert.daysLeft);
                const icon = urgencyIcon(urgency);
                const title = escHtml(buildTitle(alert));
                const timeStr = daysLabel(alert.daysLeft, alert.expiry_date);
                const vehicleId = alert.vehicleId || '';
                const ctaClass = urgency === 'urgent' ? 'btn-danger' : 'btn-primary';
                const ctaLabel = urgency === 'urgent' ? 'Renew Now' : 'View Vehicle';

                return `
        <div class="notif-card unread ${urgency}" data-type="${urgency}"
             data-vehicle-id="${escHtml(String(vehicleId))}"
             data-doc-type="${escHtml(alert.type)}"
             data-expiry-date="${escHtml(alert.expiry_date || '')}">
          <div class="notif-icon ${urgency}">${icon}</div>
          <div class="notif-content">
            <div class="notif-header">
              <h4>${title}</h4>
              <span class="notif-time">${timeStr}</span>
            </div>
            <div class="notif-actions">
              <a href="vehicle-detail.html?id=${escHtml(String(vehicleId))}"
                 class="btn btn-sm ${ctaClass}">${ctaLabel}</a>
              <button class="btn btn-sm btn-outline mark-read-btn">Mark as Read</button>
            </div>
          </div>
          <div class="notif-unread-dot"></div>
        </div>`;
            }

            /* ── Render ──────────────────────────────────────────────────────────── */

            function renderAlerts(alerts) {
                $('#notif-skeleton').hide();
                const container = $('#notificationsList');

                if (!alerts || !alerts.length) {
                    container.html(
                        '<div style="text-align:center;padding:3rem;color:var(--gray-500);">' +
                        '<p style="font-size:2.5rem;">🔔</p>' +
                        '<p style="margin-top:.75rem;font-weight:500;color:var(--gray-600);">No notifications</p>' +
                        '<p style="font-size:.875rem;margin-top:.375rem;">All clear! No document alerts at the moment.</p>' +
                        '</div>'
                    );
                    updateCounts();
                    return;
                }

                const severityRank = { urgent: 0, warning: 1, info: 2 };
                const sorted = alerts.slice().sort(function (a, b) {
                    const ua = getUrgency(a.daysLeft), ub = getUrgency(b.daysLeft);
                    if (severityRank[ua] !== severityRank[ub]) return severityRank[ua] - severityRank[ub];
                    return a.daysLeft - b.daysLeft;
                });

                container.html(
                    '<div class="notif-group">' +
                    '<h3 class="notif-group-title">Document Alerts</h3>' +
                    sorted.map(buildCard).join('') +
                    '</div>'
                );

                updateCounts();
            }

            /* ── Counts & tabs ───────────────────────────────────────────────────── */

            function updateCounts() {
                const total = $('.notif-card').length;
                const unread = $('.notif-card.unread').length;
                const urgent = $('.notif-card[data-type="urgent"]').length;
                const warning = $('.notif-card[data-type="warning"]').length;
                const info = $('.notif-card[data-type="info"]').length;

                $('#count-all').text(total);
                $('#count-unread').text(unread);
                $('#count-urgent').text(urgent);
                $('#count-warning').text(warning);
                $('#count-info').text(info);

                ['notifBadge', 'sidebarNotifBadge', 'bottomNotifBadge'].forEach(function (id) {
                    const el = document.getElementById(id);
                    if (el) { el.textContent = unread; el.style.display = unread === 0 ? 'none' : ''; }
                });
            }

            /* ── Tab filter ──────────────────────────────────────────────────────── */

            $('.notif-tab').on('click', function () {
                $('.notif-tab').removeClass('active');
                $(this).addClass('active');
                const filter = $(this).data('filter');
                if (filter === 'all') {
                    $('.notif-card').show();
                } else if (filter === 'unread') {
                    $('.notif-card').hide(); $('.notif-card.unread').show();
                } else {
                    $('.notif-card').hide(); $('.notif-card[data-type="' + filter + '"]').show();
                }
            });

            /* ── Mark as read ────────────────────────────────────────────────────── */

            $(document).on('click', '.mark-read-btn', function () {
                const card = $(this).closest('.notif-card');
                card.removeClass('unread').addClass('read').find('.notif-unread-dot').remove();
                $(this).remove();
                updateCounts();
                showNotification('Marked as read', 'success');
            });

            $('#markAllReadBtn').on('click', function () {
                $('.notif-card').removeClass('unread').addClass('read');
                $('.notif-unread-dot').remove();
                $('.mark-read-btn').remove();
                updateCounts();
                showNotification('All notifications marked as read', 'success');
            });

            /* ── Load ────────────────────────────────────────────────────────────── */

            function loadAlerts() {
                const stored = sessionStorage.getItem('alerts');

                if (stored !== null) {
                    // Cache exists — render immediately
                    const alerts = JSON.parse(stored);
                    renderAlerts(alerts);
                    return;
                }

                // Cache empty — layout.js is fetching in background, wait for it
                document.addEventListener('alertsReady', function onReady() {
                    document.removeEventListener('alertsReady', onReady);
                    const fresh = sessionStorage.getItem('alerts');
                    renderAlerts(fresh ? JSON.parse(fresh) : []);
                });

                // Safety net: 8s timeout
                setTimeout(function () {
                    if ($('#notif-skeleton').is(':visible')) {
                        renderAlerts([]);
                    }
                }, 8000);
            }

            loadAlerts();
        });
    </script>

</body>

</html>
